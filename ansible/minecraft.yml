---
- hosts: minecraft
  become: true

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install Java
      apt:
        name: openjdk-21-jre-headless
        state: present

    - name: Create Minecraft directory
      file:
        path: /opt/minecraft
        state: directory
        mode: '0755'

    - name: Download Minecraft server
      get_url:
        url: https://piston-data.mojang.com/v1/objects/4707d00eb834b446575d89a61a11b5d548d8c001/server.jar
        dest: /opt/minecraft/server.jar

    - name: Accept EULA
      copy:
        content: "eula=true"
        dest: /opt/minecraft/eula.txt

    - name: Create minecraft service
      copy:
        dest: /etc/systemd/system/minecraft.service
        content: |
          [Unit]
          Description=Minecraft Server
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/opt/minecraft
          ExecStart=/usr/bin/java -Xmx1G -Xms1G -jar server.jar nogui
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Enable minecraft service
      systemd:
        name: minecraft
        enabled: yes
        state: started
